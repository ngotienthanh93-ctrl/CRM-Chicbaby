# PostgreSQL cho CRM Chicbaby (dev). Container này đã được dựng sẵn.
# Dùng lại: docker compose up -d   |   Tắt: docker compose down (giữ volume, không mất dữ liệu)
services:
  postgres:
    image: postgres:16-alpine
    container_name: chicbaby-crm-pg
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_dev_pw
      POSTGRES_DB: chicbaby_crm
    ports:
      - "5433:5432" # host 5433 -> tránh xung đột 5432; server dùng DATABASE_URL trỏ 5433
    volumes:
      - chicbaby-crm-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  chicbaby-crm-pgdata:
